<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CampusRide - Register Vehicle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      /* ===== GLOBAL ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      /* ===== NAVBAR ===== */
      .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        background-color: #1e3a8a;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 80px;
        z-index: 1000;
      }

      .logo {
        font-size: 20px;
        font-weight: 600;
      }

      .navbar ul {
        list-style: none;
        display: flex;
        gap: 30px;
      }

      .navbar ul li a {
        text-decoration: none;
        color: white;
      }

      .navbar button {
        background-color: white;
        color: #1e3a8a;
        border: none;
        padding: 8px 18px;
        border-radius: 20px;
        cursor: pointer;
      }

      /* ===== BODY ===== */
      body {
        padding-top: 100px; /* space for navbar */
      }

      /* ===== BACKGROUND ===== */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
          url("images/register.png") no-repeat center center/cover;
        z-index: -1;
      }

      /* ===== TITLE ===== */
      .title-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 25px;
        margin-bottom: 25px;
      }

      .page-title {
        font-size: 52px;
        font-weight: bold;
        animation: colorChange 4s infinite alternate;
      }

      @keyframes colorChange {
        0% {
          color: #87cefa;
        }
        50% {
          color: #ffb6c1;
        }
        100% {
          color: #ff7f7f;
        }
      }

      .icon {
        font-size: 70px;
      }

      /* ===== CONTAINER ===== */
      .container {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        width: 750px;
        padding: 35px;
        border-radius: 20px;
        margin: auto;
      }

      /* ===== FORM ===== */
      form {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px 30px;
      }

      .full-width {
        grid-column: span 2;
      }

      /* ===== INPUT ===== */
      label {
        color: white;
        font-weight: bold;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.2);
        color: white;
      }

      input::placeholder {
        color: #ffffff;
      }

      /* ===== BUTTON ===== */
      #submit-btn {
        grid-column: span 2;
        padding: 13px;
        background: linear-gradient(45deg, #60a5fa, #1e3a8a);
        color: white;
        border: none;
        border-radius: 30px;
      }

      select {
        color: white;
      }

      select option {
        color: black;
        background: white;
      }
      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        .container {
          width: 90%;
        }
        form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <!-- ✅ NAVBAR -->
    <header class="navbar">
      <div class="logo">CampusRide</div>
      <ul>
        <li><a href="dashboard.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><button onclick="logout()">Logout</button></li>
      </ul>
    </header>

    <!-- TITLE -->
    <div class="title-container">
      <span class="icon">🚗</span>
      <h1 class="page-title">Register Vehicle</h1>
      <span class="icon">🏍️</span>
    </div>

    <!-- FORM -->
    <div class="container">
      <form id="vehicleForm">
        <input type="text" name="name" placeholder="Name" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="tel" name="mobile" placeholder="Mobile" required />

        <select name="gender">
          <option>--Gender--</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>

        <div class="full-width">
          <label class="file-upload">
            Upload College ID
            <input type="file" name="collegeId" required />
          </label>
        </div>

        <div class="full-width">
          <label class="file-upload">
            Upload Driving License
            <input type="file" name="license" required />
          </label>
        </div>

        <div class="full-width">
          <label class="file-upload">
            Upload RC Document
            <input type="file" name="rc" required />
          </label>
        </div>

        <input
          type="text"
          name="vehicleModel"
          placeholder="Vehicle Model"
          required
        />
        <input
          type="text"
          name="vehicleNumber"
          placeholder="Vehicle Number"
          required
        />

        <button type="submit" id="submit-btn">Submit</button>
      </form>
    </div>

    <script>
      const role = localStorage.getItem("role");

      if (!role) {
        alert("Login required");
        window.location.href = "login.html";
      }
      document
        .getElementById("vehicleForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const formData = new FormData(this);

          const response = await fetch(
            "http://localhost:8081/api/vehicle/register",
            {
              method: "POST",
              body: formData,
            },
          );
          const email = localStorage.getItem("email");
          if (email !== formData.get("email")) {
            alert("Email must match the logged in user!");
            return;
          }

          const text = await response.text();
          if (!response.ok) {
            alert("Registration failed: " + text);
            return;
          }
          alert(text);
          window.location.href = "dashboard.html";
        });

      function logout() {
        localStorage.clear();
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
