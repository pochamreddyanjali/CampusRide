<!doctype html>
<html>
  <head>
    <title>Admin Dashboard</title>
  </head>
  <style>
    /* ===== NAVBAR ===== */
    .navbar {
      background-color: #1e3a8a;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 80px;
    }

    .logo {
      font-size: 20px;
      font-weight: 600;
    }

    .navbar ul {
      list-style: none;
      display: flex;
      gap: 30px;
    }

    .navbar ul li a {
      text-decoration: none;
      color: white;
      font-size: 15px;
    }

    .navbar ul li a.active {
      border-bottom: 2px solid white;
    }

    .navbar button {
      background-color: white;
      color: #1e3a8a;
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
  <body>
    <!-- ✅ NAVBAR -->
    <header class="navbar">
      <div class="logo">CampusRide</div>
      <ul>
        <li><a href="dashboard.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><button onclick="logout()">Logout</button></li>
      </ul>
    </header>
    <h2>Pending Vehicle Requests</h2>

    <div id="vehicleList"></div>
    <!-- Image Modal -->
    <div
      id="imageModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        justify-content: center;
        align-items: center;
        z-index: 999;
      "
    >
      <img
        id="modalImage"
        style="max-width: 80%; max-height: 80%; border-radius: 10px"
      />
    </div>
  </body>
  <script>
    function logout() {
      localStorage.clear();

      window.location.href = "login.html";
    }
    const role = localStorage.getItem("role");

    if (!role) {
      alert("Login required");
      window.location.href = "login.html";
    } else if (role !== "ADMIN") {
      alert("Access denied");
      window.location.href = "dashboard.html";
    }

    function openModal(src) {
      const modal = document.getElementById("imageModal");
      const modalImg = document.getElementById("modalImage");

      modal.style.display = "flex";
      modalImg.src = src;
    }

    function closeModal() {
      document.getElementById("imageModal").style.display = "none";
    }

    // Close when clicking anywhere
    document.getElementById("imageModal").onclick = closeModal;

    const adminEmail = localStorage.getItem("email");

    async function loadVehicles() {
      const response = await fetch(
        `http://localhost:8081/api/admin/vehicles/pending?adminEmail=${adminEmail}`,
      );

      const vehicles = await response.json();

      const container = document.getElementById("vehicleList");
      container.innerHTML = "";
      if (vehicles.length === 0) {
        container.innerHTML = `
            <div style="padding:20px; text-align:center; color:gray;">
                <h3>No pending vehicles 🚗</h3>
                <p>All vehicles are verified.</p>
            </div>
        `;
        return;
      }

      vehicles.forEach((v) => {
        container.innerHTML += `
            <div style="
        border:1px solid #ddd;
        border-radius:10px;
        padding:15px;
        margin:15px;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);">
        <h3><b>Name:</b> ${v.name}</h3>
        <p><b>Vehicle:</b> ${v.vehicleModel}</p>
        <p><b>Number:</b> ${v.vehicleNumber}</p>

        <div style="display:flex; gap:10px; margin-top:10px;">
            <img src="http://localhost:8081/${v.collegeIdImage}" width="100" style="cursor:pointer; border-radius:6px;" onclick="openModal(this.src)">
            <img src="http://localhost:8081/${v.licenseImage}" width="100" style="cursor:pointer; border-radius:6px;" onclick="openModal(this.src)">
            <img src="http://localhost:8081/${v.rcImage}" width="100" style="cursor:pointer; border-radius:6px;" onclick="openModal(this.src)">
        </div>

        <div style="margin-top:10px;">
            <button onclick="approve(${v.id})"
                style="background-color:green; color:white; padding:8px 12px; border:none; border-radius:5px;">
                Approve
            </button>

            <button onclick="reject(${v.id})"
                style="background-color:red; color:white; padding:8px 12px; border:none; border-radius:5px; margin-left:10px;">
                Reject
            </button>
        </div>
    </div>
`;
      });
    }

    async function approve(id) {
      await fetch(
        `http://localhost:8081/api/admin/vehicle/${id}/approve?adminEmail=${adminEmail}`,
        {
          method: "PUT",
        },
      );
      loadVehicles();
    }

    async function reject(id) {
      await fetch(
        `http://localhost:8081/api/admin/vehicle/${id}/reject?adminEmail=${adminEmail}`,
        {
          method: "PUT",
        },
      );
      loadVehicles();
    }

    loadVehicles();
  </script>
</html>
