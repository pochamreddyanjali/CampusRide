<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>CampusRide Profile</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== BODY ===== */
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #eef2f7, #e3ebf5);
    color: #2c3e50;
    padding-top: 90px; /* space for navbar */
}

/* ===== NAVBAR ===== */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background-color: #1e3a8a;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 80px;
    z-index: 1000;
}

.logo {
    font-size: 20px;
    font-weight: 600;
}

.navbar ul {
    list-style: none;
    display: flex;
    gap: 30px;
}

.navbar ul li a {
    text-decoration: none;
    color: white;
}

.navbar button {
    background-color: white;
    color: #1e3a8a;
    border: none;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
}

/* ===== CONTAINER ===== */
.container {
    width: 85%;
    margin: 40px auto;
}

/* ===== CARD ===== */
.card {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

/* ===== PROFILE ===== */
.profile {
    display: flex;
    align-items: center;
    gap: 30px;
}

.profile img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 4px solid #4a90e2;
}

.profile-details h2 {
    font-size: 26px;
}

.logout-btn {
    margin-left: auto;
    padding: 10px 16px;
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 8px;
}

/* ===== TABLE ===== */
.section-title {
    font-size: 18px;
    margin-bottom: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #4a90e2;
    color: white;
    padding: 14px;
}

td {
    padding: 14px;
    border-bottom: 1px solid #eee;
    text-align: center;
}

/* ===== STATUS ===== */
.badge {
    padding: 6px 12px;
    border-radius: 20px;
}

.approved { background: #d4edda; color: #2e7d32; }
.pending { background: #fff3cd; color: #856404; }
.rejected { background: #f8d7da; color: #721c24; }
</style>
</head>

<body>

<!-- ✅ NAVBAR -->
<header class="navbar">
    <div class="logo">CampusRide</div>
    <ul>
        <li><a href="dashboard.html">Home</a></li>
        <li><a href="#">My Trips</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><button onclick="logout()">Logout</button></li>
    </ul>
</header>

<div class="container">

    <!-- PROFILE -->
    <div class="card profile">
        <img src="https://via.placeholder.com/130">

        <div class="profile-details">
            <h2 id="name">Loading...</h2>
            <p>Email: <span id="email"></span></p>
            <p>Phone: <span id="phone"></span></p>
        </div>
    </div>

    <!-- VEHICLES -->
    <div class="card">
        <div class="section-title">🚗 Registered Vehicles</div>
        <table>
            <thead>
                <tr>
                    <th>Model</th>
                    <th>Vehicle Number</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="vehicleTable"></tbody>
        </table>
    </div>

    <!-- RIDES OFFERED -->
    <div class="card">
        <div class="section-title">📤 Rides Offered</div>
        <table>
            <thead>
                <tr>
                    <th>Pickup</th>
                    <th>Destination</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="offeredTable"></tbody>
        </table>
    </div>

    <!-- RIDES USED -->
    <div class="card">
        <div class="section-title">📥 Rides Used</div>
        <table>
            <thead>
                <tr>
                    <th>Pickup</th>
                    <th>Destination</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="usedTable"></tbody>
        </table>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const email = localStorage.getItem("email");

    if (!email) {
        alert("Login required");
        window.location.href = "login.html";
        return;
    }

    fetch(`http://localhost:8081/api/dashboard/${email}`)
    .then(res => res.json())
    .then(data => {

        document.getElementById("name").innerText = data.name;
        document.getElementById("email").innerText = data.email;
        document.getElementById("phone").innerText = data.phone;

        const vTable = document.getElementById("vehicleTable");

        if (data.vehicles.length === 0) {
            vTable.innerHTML = "<tr><td colspan='3'>No vehicles registered</td></tr>";
        } else {
            data.vehicles.forEach(v => {
                vTable.innerHTML += `
                <tr>
                    <td>${v.type}</td>
                    <td>${v.number}</td>
                    <td>
                        <span class="badge ${v.status.toLowerCase()}">
                            ${v.status}
                        </span>
                    </td>
                </tr>`;
            });
        }


        const oTable = document.getElementById("offeredTable");
        oTable.innerHTML = "";

        if (data.ridesOffered.length === 0) {
            oTable.innerHTML = "<tr><td colspan='3'>No rides offered</td></tr>";
        } else {
            data.ridesOffered.forEach(r => {
                oTable.innerHTML += `
                    <tr>
                        <td>${r.pickup}</td>
                        <td>${r.destination}</td>
                        <td>${r.time}</td>
                    </tr>
                `;
            });
        }


         const uTable = document.getElementById("usedTable");
        uTable.innerHTML = "";

        if (data.ridesUsed.length === 0) {
            uTable.innerHTML = "<tr><td colspan='3'>No rides used</td></tr>";
        } else {
            data.ridesUsed.forEach(r => {
                uTable.innerHTML += `
                    <tr>
                        <td>${r.pickup}</td>
                        <td>${r.destination}</td>
                        <td>${r.time}</td>
                    </tr>
                `;
            });
        }
    });
});

function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>
</html>
