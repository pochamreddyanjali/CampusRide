<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CampusRide - Offer Ride</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

/* Background Image */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url("images/offerride.png") no-repeat center center/cover;
}

/* Glass Effect Form */
.container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    padding: 35px;
    border-radius: 15px;
    width: 420px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.3);
}

/* Title */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: white;
}

/* Labels */
label {
    color: white;
    font-weight: bold;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.2);
    color: white;
}

input::placeholder {
    color: #eee;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #1e3a8a;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #163174;
}

/* Back Link */
.back {
    display: block;
    margin-top: 15px;
    text-align: center;
    color: #ddd;
    text-decoration: none;
}

.back:hover {
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h2>Offer a Ride</h2>

    <form id="rideForm">
        <label>Source</label>
        <input type="text" id="source" placeholder="Enter source" required>

        <label>Destination</label>
        <input type="text" id="destination" placeholder="Enter destination" required>

        <label>Date</label>
        <input type="date" id="rideDate" required>

        <label>Time</label>
        <input type="time" id="rideTime" required>

        <label>Seats Available</label>
        <input type="number" id="seats" placeholder="Number of seats" required>

        <button type="submit">Offer Ride</button>
    </form>

    <a href="dashboard.html" class="back">Back to Dashboard</a>
</div>

<script>
document.getElementById("rideForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = localStorage.getItem("email");

    if(!email){
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    const rideData = {
        driverEmail: email,
        source: document.getElementById("source").value,
        destination: document.getElementById("destination").value,
        rideDate: document.getElementById("rideDate").value,
        rideTime: document.getElementById("rideTime").value,
        seatsAvailable: parseInt(document.getElementById("seats").value)
    };

    const response = await fetch("http://localhost:8081/api/rides/create", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(rideData)
    });

    if(response.ok){
        alert("Ride offered successfully!");
        window.location.href = "dashboard.html";
    } else {
        alert("Error offering ride. Make sure your vehicle is approved.");
    }
});
</script>

</body>
</html>
